							<form [formGroup]="addCareerForm" (ngSubmit)="onSubmit()" #contactForm="ngForm"
								class="php-email-form w-100" method="post">
								<div class="form-floating mb-3">
									<!-- <div class="form-group">  -->
									<input type="text" name="name" autocomplete="off" formControlName="name"
										class="form-control" id="floatingInput" placeholder="name">
									<label for="floatingInput" class="mt-0">What's your name?</label>
									<div *ngIf="submitted && hasError('name','required')" class="error">
										<div>
											Name is required.
										</div>
									</div>
									<!-- </div>   -->
								</div>
								<div class="form-floating mb-3">
									<!-- <div class="form-group">  -->
									<input type="email" name="email" autocomplete="off" formControlName="email"
										class="form-control" id="floatingInput" placeholder="email">
									<label for="floatingInput" class="mt-0">What’s your e-mail?</label>
									<div *ngIf="submitted && hasEmailError('email','required')" class="error">
										<div>
											{{hasEmailError('email','required')}}
										</div>
									</div>
									<!-- </div> -->
								</div>
								<div class="form-floating mb-3">

									<!-- <input type="tel" class="form-control" name="phone" autocomplete="off" formControlName="phone"
										id="floatingInput" placeholder="phone"> -->
									<ngx-intl-tel-input id="floatingInput" class="form-control interphone"
										id="floatingInput" [cssClass]="'custom-intl-tel-input'"
										[enableAutoCountrySelect]="true" [enablePlaceholder]="false"
										[searchCountryFlag]="true" [preferredCountries]="preferredCountries"
										[searchCountryField]="[SearchCountryField.Iso2, SearchCountryField.Name]"
										[selectFirstCountry]="false"
										[selectedCountryISO]="CountryISO.UnitedArabEmirates"
										[tooltipField]="TooltipLabel.Name" [phoneValidation]="true"
										[separateDialCode]="true" name="phone" formControlName="phone">
									</ngx-intl-tel-input>
									<label for="floatingInput" class="mt-0">What's your Mobile number?</label>
									<div *ngIf="submitted && hasPhoneNumberError('phone','required')" class="error">
										<div>
											{{hasPhoneNumberError('email','required')}}
										</div>
									</div>
								</div>
								<div class="form-floating">

									<textarea name="message" class="form-control" autocomplete="off"
										formControlName="message" id="floatingTextarea" placeholder="message"
										required></textarea>
									<label for="floatingInput" class="mt-0">Tell us about your project :)</label>
									<div *ngIf="submitted && hasError('message','required')" class="error">
										<div>
											Comments is required.
										</div>
									</div>
								</div>
								<div class="detail w-100 d-none d-sm-block mt-4">
									<ul
										class="d-flex flex-row justify-content-space-between align-items-center flex-wrap pl-0 mb-0">
										<li><input type="button" id='branding' class="button branding"
												(click)="selectSub('branding')" value="Branding"></li>
										<li><input type="button" id='graphic' class="button graphic"
												(click)="selectSub('graphic')" value="Graphic">
										</li>
										<li><input type="button" id='website' class="button website"
												(click)="selectSub('website')" value="Website">
										</li>
										<li><input type="button" id='eCommerce' class="button eCommerce"
												(click)="selectSub('eCommerce')" value="eCommerce"></li>
										<!-- <li><input type="button" id='enterprise' class="button" (click)="selectSub('enterprise')" value="Enterprise Solution"></li> -->
										<!-- <li><input type="button" id='seo' class="button seo" (click)="selectSub('seo')" value="SEO"></li> -->
									</ul>
								</div>


								<div class="detail w-100 d-block d-sm-none mt-4">
									<ul
										class="d-flex flex-row justify-content-space-between align-items-center justify-content-center flex-wrap pl-0 mb-0">
										<li><input type="button" id='branding' class="button"
												(click)="selectSub('branding')" value="Branding"></li>
										<li><input type="button" id='graphic' class="button"
												(click)="selectSub('graphic')" value="Graphic">
										</li>
										<li><input type="button" id='website' class="button"
												(click)="selectSub('website')" value="Website">
										</li>
										<li><input type="button" id='eCommerce' class="button"
												(click)="selectSub('eCommerce')" value="eCommerce"></li>
										<!-- <li><input type="button" id='enterprise' class="button" (click)="selectSub('enterprise')" value="Enterprise Solution"></li> -->
										<!-- <li><input type="button" id='seo' class="button" (click)="selectSub('seo')" value="SEO"></li> -->
									</ul>
								</div>

								<div class="w-100 w-100 text-center text-sm-start">
									<input type="submit" name="submit" value="Send"
										class="float-none float-sm-end float-md-end float-lg-end float-xl-end float-xxl-end mt-5 submit">
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
<section class="candely" id="contact-calendly">
	<div class="calendly-inline-widget" style="min-width:320px;height:630px;"></div>
</section>
